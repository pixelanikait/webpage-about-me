<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <title>Contact</title>
        <link rel="stylesheet" href="css/styles.css">
        <script src="https://unpkg.com/lucide@latest"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <label class="theme-switch">
                    <input type="checkbox" id="theme-toggle" aria-label="Toggle dark mode">
                    <span class="slider"></span>
                </label>
            </nav>
        </header>
        <main>
            <section class="content">
                <h2>Contact Me</h2>
                    <div class="contact-container">
                        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=anikait.kulkarni@students.iiit.ac.in" class="contact-card">
                            <i data-lucide="mail"></i>
                            <h3>Email</h3>
                            <p>anikait.kulkarni@students.iiit.ac.in</p>
                        </a>
                        <a href="https://www.instagram.com/theboyanikait/" class="contact-card">
                            <i data-lucide="instagram"></i>
                            <h3>Instagram</h3>
                            <p>My Instagram!</p>
                        </a>
                        <a href="https://github.com/pixelanikait" target="_blank" rel="noopener noreferrer" class="contact-card">
                            <i data-lucide="github"></i>
                            <h3>GitHub</h3>
                            <p>My GitHub!</p>
                        </a>
                        <a href="https://www.linkedin.com/in/anikait-kulkarni-78a244265/" target="_blank" rel="noopener noreferrer" class="contact-card">
                            <i data-lucide="linkedin"></i>
                            <h3>LinkedIn</h3>
                            <p>My LinkedIn!</p>
                        </a>
                    </div>
                <form id="contact-form">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="What should I call you?" required>
                    <label for="email">Email ID</label>
                    <input type="email" id="email" placeholder="Your preferred Email ID" required>
                    <label for="message">Write your message here!</label>
                    <textarea id="message" placeholder="Let me know whats up!" required></textarea>
                    <button type="submit" class="contact-submit">
                        Send.
                        <i data-lucide="send"></i>
                    </button>
                </form>
                <p id="form-success" hidden>Message went through succesfully!</p>
            </section>
        </main>
        <footer>
            <p>© 2026 Anikait Kulkarni</p>
        </footer>
        <script src="js/theme.js"></script>
        <script src="js/progress.js"></script>
        <script src="js/scroll.js"></script>
        <script src="js/timeline.js"></script>
        <script src="js/form.js"></script>
        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
